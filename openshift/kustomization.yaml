apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

components:
- tools/vendor/github.com/openshift/cluster-capi-operator/manifests-gen

resources:
- ../config/default

images:
- name: gcr.io/k8s-staging-cluster-api/cluster-api-controller
  newName: registry.ci.openshift.org/openshift
  newTag: cluster-capi-controllers

patches:
- path: ./patches/enable-metadata-syncing.yaml
- path: ./patches/failure-policy-ignore-ipam-webhooks.yaml
- path: ./patches/ipam-crd-storage-version.yaml
  target:
    group: apiextensions.k8s.io
    version: v1
    kind: CustomResourceDefinition
    name: ipaddresses.ipam.cluster.x-k8s.io
- path: ./patches/ipam-crd-storage-version.yaml
  target:
    group: apiextensions.k8s.io
    version: v1
    kind: CustomResourceDefinition
    name: ipaddressclaims.ipam.cluster.x-k8s.io
- path: ./patches/ipam-crd-adopt-existing.yaml
  target:
    group: apiextensions.k8s.io
    version: v1
    kind: CustomResourceDefinition
    name: ipaddresses.ipam.cluster.x-k8s.io
- path: ./patches/ipam-crd-adopt-existing.yaml
  target:
    group: apiextensions.k8s.io
    version: v1
    kind: CustomResourceDefinition
    name: ipaddressclaims.ipam.cluster.x-k8s.io

# Add TLS configuration args (substituted by cluster-capi-operator revisiongenerator)
- target:
    kind: Deployment
    name: capi-controller-manager
  patch: |-
    - op: add
      path: /spec/template/spec/containers/0/args/-
      value: "--tls-min-version=${TLS_MIN_VERSION}"
    - op: add
      path: /spec/template/spec/containers/0/args/-
      value: "--tls-cipher-suites=${TLS_CIPHER_SUITES}"
